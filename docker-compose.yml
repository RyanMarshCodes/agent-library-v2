# Bifrost gateway — see https://docs.getbifrost.ai/quickstart/gateway/setting-up
#
# Environment: keep .env at the repository root. Values are used for
# compose interpolation (${VAR:-default}) and injected into every service below.

include:
  - path: ../knowledge-library/docker-compose.yml

name: ai-stack-runtime

services:
  mcp-server:
    build:
      context: ./apps/mcp-server
      dockerfile: src/Ryan.MCP.Mcp/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}

      McpOptions__MemoryStore__Provider: postgres
      McpOptions__MemoryStore__ConnectionString: Host=${MCP_DB_HOST};Port=${MCP_DB_PORT};Database=${MCP_DB_NAME};Username=${MCP_DB_USER};Password=${MCP_DB_PASSWORD};SSL Mode=${MCP_DB_SSLMODE};Timeout=15;Command Timeout=30
      McpOptions__MemoryStore__CommandTimeoutSeconds: ${MCP_DB_COMMAND_TIMEOUT_SECONDS:-30}

      McpOptions__Knowledge__ProjectSlug: ${MCP_PROJECT_SLUG:-ryan-mcp}
      McpOptions__Knowledge__OfficialPath: /data/library/knowledge/global
      McpOptions__Knowledge__OrganizationPath: /data/library/knowledge/backend
      McpOptions__Knowledge__ProjectPath: /data/library/knowledge/frontend
      McpOptions__Knowledge__IndexPath: /data/state/index

      McpOptions__KnowledgeLibrary__Enabled: ${KNOWLEDGE_LIBRARY_ENABLED:-false}
      McpOptions__KnowledgeLibrary__KnowledgePath: /data/knowledge-library/knowledge
      McpOptions__KnowledgeLibrary__RawPendingPath: /data/knowledge-library/raw/pending
      McpOptions__KnowledgeLibrary__RawProcessedPath: /data/knowledge-library/raw/processed

      McpOptions__OpenSearch__Enabled: ${OPENSEARCH_ENABLED:-false}
      McpOptions__OpenSearch__Url: ${OPENSEARCH_URL:-http://opensearch:9200}
      McpOptions__OpenSearch__IndexName: ${OPENSEARCH_INDEX:-knowledge-wiki}

      McpOptions__Embeddings__Enabled: ${EMBEDDINGS_ENABLED:-false}
      McpOptions__Embeddings__ApiKey: ${OPENAI_API_KEY:-}
      McpOptions__Embeddings__Model: ${EMBEDDINGS_MODEL:-text-embedding-3-small}
      McpOptions__Embeddings__BaseUrl: ${EMBEDDINGS_BASE_URL:-https://api.openai.com/v1}

      McpOptions__Agents__LibraryPath: /data/library/agents
      McpOptions__Agents__LocalPath: /data/state/agents

      McpOptions__Ingestion__AutoIngestOnStartup: ${MCP_AUTO_INGEST_ON_STARTUP:-true}
      McpOptions__Ingestion__WatchForChanges: ${MCP_WATCH_FOR_CHANGES:-false}

      # Optional token pass-through for remote connectors
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      AZURE_DEVOPS_PAT: ${AZURE_DEVOPS_PAT:-}
    ports:
      - "${MCP_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_started
    volumes:
      - ./library:/data/library:ro
      - ${KNOWLEDGE_LIBRARY_PATH:-../knowledge-library}:/data/knowledge-library
      - mcp_state:/data/state
    networks:
      - bifrost
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8081/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  bifrost:
    build:
      context: ./infra/bifrost
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      # Bind on all interfaces inside the container so published ports work (default APP_HOST is localhost in CLI docs).
      APP_HOST: "0.0.0.0"
      APP_PORT: "8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_STYLE: ${LOG_STYLE:-json}
    volumes:
      - bifrost_data:/app/data
      - ./infra/bifrost/bifrost.config.json:/app/data/config.json:ro
    networks:
      - bifrost
    # Postgres/Redis are optional (profiles). Compose cannot reference profiled services in depends_on
    # without breaking the default stack, so start order is handled by restart policies and healthchecks.
    healthcheck:
      test: [ "CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${LOCAL_POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_ADMIN_PASSWORD:-postgres}
      POSTGRES_DB: ${LOCAL_POSTGRES_DEFAULT_DB:-postgres}
      # Bifrost requires UTF-8 DB encoding (https://docs.getbifrost.ai/quickstart/gateway/setting-up#postgresql-utf8-requirement).
      # Applied only on first init (empty data volume). To re-init, remove the postgres_data volume. Override via .env if needed.
      POSTGRES_INITDB_ARGS: ${LOCAL_POSTGRES_INITDB_ARGS:---encoding=UTF8 --lc-collate=C.UTF-8 --lc-ctype=C.UTF-8}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/mcp/initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - bifrost
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $$POSTGRES_DB -U $$POSTGRES_USER" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - .env
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    networks:
      - bifrost
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  bifrost:
    name: bifrost_net
    driver: bridge

volumes:
  mcp_state:
  bifrost_data:
  postgres_data:
  redis_data:
