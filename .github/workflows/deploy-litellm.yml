# Deploy LiteLLM stack to a VPS over SSH (rsync compose + config, write .env from secrets).
#
# Required GitHub repository secrets:
#   SSH_PRIVATE_KEY   — full private key for deploy user (PEM)
#   VPS_HOST          — hostname or IP
#   VPS_USER          — SSH user (e.g. deploy, ubuntu)
#   LITELLM_DOTENV    — full contents of infra/litellm/.env (multiline)
#
# Optional:
#   VPS_DEPLOY_PATH   — remote directory (default: /opt/litellm)

name: Deploy LiteLLM

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "infra/litellm/**"
      - ".github/workflows/deploy-litellm.yml"

concurrency:
  group: deploy-litellm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Rsync stack files (no .env from repo)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          DEPLOY_PATH="${VPS_DEPLOY_PATH:-/opt/litellm}"
          ssh "${VPS_USER}@${VPS_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          rsync -avz --delete \
            --exclude '.env' \
            --exclude '*.log' \
            ./infra/litellm/ \
            "${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/"

      - name: Write .env on server and restart stack
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          LITELLM_DOTENV: ${{ secrets.LITELLM_DOTENV }}
        run: |
          set -euo pipefail
          DEPLOY_PATH="${VPS_DEPLOY_PATH:-/opt/litellm}"
          printf '%s\n' "$LITELLM_DOTENV" | ssh "${VPS_USER}@${VPS_HOST}" "umask 077; cat > '${DEPLOY_PATH}/.env'"
          ssh "${VPS_USER}@${VPS_HOST}" "chmod 600 '${DEPLOY_PATH}/.env'"
          ssh "${VPS_USER}@${VPS_HOST}" "cd '${DEPLOY_PATH}' && docker compose pull && docker compose up -d --remove-orphans"
